<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="SCSS/miEstilo.css" />
    <title>Document</title>
  </head>
  <body>
    <h1>Esquema de particiones fijas</h1>

    <div class="contenedor-principal">  <!-- Añadimos un contenedor para facilitar la distribucion --> 

      <section class="panel-procesos">
        <h2>Procesos preparados</h2>
        <div class="memoria lista-espera">
          <div id="proc-word" class="particion tam1 word" data-tam="1.5"> 
            <span class="dir-mem top">0</span> <!-- añadimos span para las direcciones de memoria, top arriba bottom abajo -->
            <span class="tam-interno">1,5MB</span>
            <span class="nombre-proceso">Word</span>
            <span class="dir-mem bottom">1250</span> 
          </div>

          <div id="proc-chrome" class="particion tam2 chrome" data-tam="2.5"> <!-- añado id para que  el drag and drop sea posible -->
            <span class="dir-mem top">0</span>
            <span class="tam-interno">2,5MB</span>
            <span class="nombre-proceso">Chrome</span>
            <span class="dir-mem bottom">2650</span>
          </div>

          <div id="proc-vscode" class="particion tam2 vscode" data-tam="1.5"> <!-- data-tam representa el tamaño del proceso en MB -->
            <span class="dir-mem top">0</span>
            <span class="tam-interno">1,5MB</span>
            <span class="nombre-proceso">VSCode</span>
            <span class="dir-mem bottom">1552</span>
          </div>

          <div id="proc-calculadora" class="particion tam3 calculadora" data-tam="2.5">
            <span class="dir-mem top">0</span>
            <span class="tam-interno">2,5MB</span>
            <span class="nombre-proceso">Calculadora</span>
            <span class="dir-mem bottom">2650</span>
          </div>
          
          <button class="btn-anadir" type="button">+</button>
        </div>
      </section>

      <section class="panel-memoria">  <!-- dejamos limpio el contenedor de memoria-->
        <h2>Memoria principal</h2>
        <div class="memoria">
          <div class="particion tam1" data-tam="1">
            <span class="tooltiptext"></span>
          </div>
          <div class="particion tam2" data-tam="2">
            <span class="tooltiptext"></span>
          </div>
          <div class="particion tam3" data-tam="3">
            <span class="tooltiptext"></span>
          </div>
          <div class="particion tam3" data-tam="3">
            <span class="tooltiptext"></span> <!-- añadimos tooltip para mostrar informacion adicional Commit 4 -->
          </div>
          <button class="btn-anadir" type="button">+</button>
        </div>
      </section>
    </div>
    <script src="JS/main.js"></script>
  </body>
</html>
